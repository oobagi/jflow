name: release

on:
  workflow_dispatch:
    inputs:
      target:
        description: Release target
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Determine tag
        id: tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ "${{ inputs.target }}" = "production" ]; then
            TAG="v$VERSION"
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "::error::Tag $TAG already exists. Bump VERSION before releasing."
              exit 1
            fi
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            TAG="v$VERSION-preview.${{ github.run_number }}"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FLAGS="--generate-notes --title ${{ steps.tag.outputs.tag }}"
          if [ "${{ steps.tag.outputs.prerelease }}" = "true" ]; then
            FLAGS="$FLAGS --prerelease"
          else
            FLAGS="$FLAGS --latest"
          fi
          gh release create "${{ steps.tag.outputs.tag }}" $FLAGS
